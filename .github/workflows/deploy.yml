name: Deploy Spring Boot

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '21'

    - name: Build JAR
      run: mvn clean package -DskipTests

    - name: Copy JAR to VPS
      uses: appleboy/scp-action@v0.1.7
      with:
        host: 163.245.215.37
        username: root
        key: ${{ secrets.SSH_KEY }}
        source: "target/medtrackfit-0.0.1-SNAPSHOT.jar"
        target: "/root/med/"
        strip_components: 1

    - name: Restart Application via PM2
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: 163.245.215.37
        username: root
        key: ${{ secrets.SSH_KEY }}
        script: |
          echo "Deploying new version"
          cd /root/med
          ls -lh
          pm2 restart medtrackfit
          pm2 list